name: Keep Supabase Alive

on:
  schedule:
    - cron: "0 0 */3 * *"   # every 3 days
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        run: |
          curl "https://xrkjhecundwngdtxklyx.supabase.co/rest/v1/profiles?select=id&limit=1" \
          -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}"